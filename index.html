<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高中地理知识库</title>
<meta name="description" content="面向高中地理学习、备课和高考复习的开放知识站。">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-logo">🌏</div>
      <div>
        <div class="brand-title">高中地理知识库</div>
        <div class="brand-sub">章节讲义 · 白板关系 · 原子卡片</div>
      </div>
    </div>

    <div class="searchbox">
      <input id="search-input" type="search" placeholder="搜索章节 / 概念 / 考点">
      <div id="search-results"></div>
    </div>

    <nav id="nav"></nav>

    <div class="sidebar-footer">
      <span id="footer-stats"></span>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <div class="crumbs" id="crumbs">首页</div>
      <div class="topbar-right">
        <button class="btn-link" data-route="#/cards">📇 卡片索引</button>
        <button class="btn-link" data-route="#/">🏠 首页</button>
      </div>
    </header>
    <article id="content" class="content"></article>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
